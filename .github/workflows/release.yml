# =============================================================================
# release.yml — Automated Semantic Versioning & Release
# =============================================================================
#
# WHY THIS WORKFLOW EXISTS:
#   Automates version computation, changelog generation, and GitHub release
#   creation based on Conventional Commits and git tags.
#
# HOW IT WORKS:
#   1. Triggered on push to main or manual dispatch
#   2. Computes version from git tags via jgitver
#   3. Creates a git tag and GitHub Release
# =============================================================================

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no tag, no release)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Version & Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(release):')"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute version from git history
        id: version
        run: |
          # jgitver computes version from git tags
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout 2>/dev/null || echo "0.0.1-SNAPSHOT")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Check if this is a SNAPSHOT (development) version
          if [[ "$VERSION" == *-SNAPSHOT* ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Version is SNAPSHOT (${VERSION}), skipping release."
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "Release version: ${VERSION}"
          fi

      - name: Create tag and release
        if: steps.version.outputs.skipped == 'false' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          # Create and push tag
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

          # Create GitHub Release
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file CHANGELOG.md \
            --verify-tag
