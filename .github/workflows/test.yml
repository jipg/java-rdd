# =============================================================================
# test.yml — Test Execution & Code Coverage
# =============================================================================
#
# WHY THIS WORKFLOW EXISTS:
#   Runs the test suite on every push and PR to main. Collects code coverage
#   via JaCoCo and uploads artifacts for downstream reporting and PR review.
# =============================================================================

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run tests with coverage
        run: ./mvnw verify -Ddependency-check.skip=true

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/'
          retention-days: 30
