# =============================================================================
# gitleaks.yml — Secret Detection in CI
# =============================================================================
#
# WHY THIS WORKFLOW EXISTS:
#   Prevents secrets from being merged into the codebase. Runs on every PR
#   and push to main. Uses the Gitleaks CLI directly (no paid license needed
#   for the CLI approach, unlike the gitleaks-action which requires a license
#   key for private repos).
#
# APPROACH:
#   Instead of using gitleaks/gitleaks-action (which requires GITLEAKS_LICENSE
#   for private repos), we install the Gitleaks CLI directly and run it.
#   This is 100% free for both public and private repositories.
#
# =============================================================================

name: Gitleaks Secret Detection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed to scan all commits

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          archive_path="/tmp/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${archive_path}"
          tar -xzf "${archive_path}" -C /usr/local/bin gitleaks
          rm -f "${archive_path}"
          gitleaks version

      - name: Run Gitleaks on PR diff
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts "${{ github.event.pull_request.base.sha }}..HEAD" \
            --verbose \
            --exit-code 1

      - name: Run Gitleaks on push (full scan)
        if: github.event_name == 'push'
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --exit-code 1
