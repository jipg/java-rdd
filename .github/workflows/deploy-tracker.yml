# =============================================================================
# deploy-tracker.yml — Reusable Workflow for DORA Deploy Event Emission
# =============================================================================
#
# WHY THIS WORKFLOW EXISTS:
#   Every deployment (success or failure) must emit a structured event to
#   Splunk HEC. These events are the raw data for computing DORA metrics:
#   - Deployment Frequency: count of events
#   - Lead Time for Changes: first_commit_at → deployed_at
#   - Change Failure Rate: failures / total
#
#   Without explicit emission, DORA metrics are either unavailable or
#   based on unreliable proxies (e.g., counting merged PRs as "deploys").
#
# HOW TO USE:
#   This is a reusable workflow. Call it from your deploy workflow:
#
#   jobs:
#     deploy:
#       # ... your deploy steps ...
#
#     track-deploy:
#       needs: deploy
#       if: always()  # Track both success and failure
#       uses: ./.github/workflows/deploy-tracker.yml
#       with:
#         deploy_status: ${{ needs.deploy.result }}
#         deploy_environment: production
#         deploy_started_at: ${{ needs.deploy.outputs.started_at }}
#       secrets: inherit
#
# REQUIRED SECRETS:
#   SPLUNK_HEC_URL:   Splunk HEC endpoint URL
#   SPLUNK_HEC_TOKEN: Splunk HEC authentication token
#
# OPTIONAL REPOSITORY VARIABLES (Settings → Variables):
#   DORA_DOMAIN:  Business domain (defaults to repo org name)
#   DORA_SERVICE: Service name (defaults to repo name)
#
# =============================================================================

name: Track Deploy Event

on:
  workflow_call:
    inputs:
      deploy_status:
        description: "Deployment result: success, failure, or rollback"
        required: true
        type: string
      deploy_environment:
        description: "Target environment: staging or production"
        required: true
        type: string
      deploy_started_at:
        description: "ISO 8601 timestamp when deploy began"
        required: false
        type: string
      deploy_trigger:
        description: "What triggered the deploy: push, manual, rollback, hotfix, scheduled"
        required: false
        type: string
        default: "push"
      release_tag:
        description: "Semantic version tag (e.g., v1.2.3) if applicable"
        required: false
        type: string

permissions:
  contents: read

jobs:
  emit-deploy-event:
    name: Emit DORA deploy event to Splunk
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for first-commit calculation

      - name: Compute deploy metadata
        id: metadata
        env:
          DEPLOY_STARTED_AT_INPUT: ${{ inputs.deploy_started_at }}
          DEPLOY_STATUS_INPUT: ${{ inputs.deploy_status }}
          DORA_DOMAIN_VAR: ${{ vars.DORA_DOMAIN }}
          DORA_SERVICE_VAR: ${{ vars.DORA_SERVICE }}
          GITHUB_EVENT_REPOSITORY_NAME: ${{ github.event.repository.name }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        run: |
          # --- Deploy ID ---
          DEPLOY_ID="${GITHUB_RUN_ID_VALUE}-${GITHUB_RUN_ATTEMPT_VALUE}"
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"

          # --- Timestamps ---
          FINISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "finished_at=${FINISHED_AT}" >> "$GITHUB_OUTPUT"

          STARTED_AT="${DEPLOY_STARTED_AT_INPUT}"
          if [ -z "$STARTED_AT" ]; then
            STARTED_AT="$FINISHED_AT"
          fi
          echo "started_at=${STARTED_AT}" >> "$GITHUB_OUTPUT"

          # --- Duration ---
          START_EPOCH=$(date -d "$STARTED_AT" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$STARTED_AT" +%s 2>/dev/null || echo "0")
          FINISH_EPOCH=$(date -d "$FINISHED_AT" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$FINISHED_AT" +%s 2>/dev/null || echo "0")
          if [ "$START_EPOCH" -gt 0 ] && [ "$FINISH_EPOCH" -gt 0 ]; then
            DURATION_MS=$(( (FINISH_EPOCH - START_EPOCH) * 1000 ))
          else
            DURATION_MS=0
          fi
          echo "duration_ms=${DURATION_MS}" >> "$GITHUB_OUTPUT"

          # --- PR number (from merge commit message) ---
          PR_NUMBER=$(git log -1 --pretty=%s | grep -oE '#[0-9]+' | head -1 | tr -d '#' || echo "")
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # --- First commit timestamp in the PR (for Lead Time) ---
          # Attempts to find the first commit that diverged from the merge base
          if [ -n "$PR_NUMBER" ]; then
            # Get merge base with main (the point where the branch diverged)
            MERGE_BASE=$(git merge-base HEAD~1 HEAD 2>/dev/null || echo "")
            if [ -n "$MERGE_BASE" ]; then
              FIRST_COMMIT_AT=$(git log --reverse --format=%aI "${MERGE_BASE}..HEAD" 2>/dev/null | head -1 || echo "")
            fi
          fi
          if [ -z "${FIRST_COMMIT_AT:-}" ]; then
            # Fallback: use the current commit's author date
            FIRST_COMMIT_AT=$(git log -1 --format=%aI)
          fi
          echo "first_commit_at=${FIRST_COMMIT_AT}" >> "$GITHUB_OUTPUT"

          # --- Lead Time (pre-computed for simpler Splunk queries) ---
          FIRST_EPOCH=$(date -d "$FIRST_COMMIT_AT" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S%z" "$FIRST_COMMIT_AT" +%s 2>/dev/null || echo "0")
          if [ "$FIRST_EPOCH" -gt 0 ] && [ "$FINISH_EPOCH" -gt 0 ]; then
            LEAD_TIME_MS=$(( (FINISH_EPOCH - FIRST_EPOCH) * 1000 ))
          else
            LEAD_TIME_MS=0
          fi
          echo "lead_time_ms=${LEAD_TIME_MS}" >> "$GITHUB_OUTPUT"

          # --- Is failure (for CFR) ---
          STATUS="${DEPLOY_STATUS_INPUT}"
          if [ "$STATUS" = "failure" ] || [ "$STATUS" = "rollback" ]; then
            echo "is_failure=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_failure=false" >> "$GITHUB_OUTPUT"
          fi

          # --- Domain and Service ---
          DOMAIN="${DORA_DOMAIN_VAR}"
          if [ -z "$DOMAIN" ]; then
            DOMAIN=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          fi
          echo "domain=${DOMAIN}" >> "$GITHUB_OUTPUT"

          SERVICE="${DORA_SERVICE_VAR}"
          if [ -z "$SERVICE" ]; then
            SERVICE=$(echo "${GITHUB_EVENT_REPOSITORY_NAME}" | tr '[:upper:]' '[:lower:]')
          fi
          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"

      - name: Send deploy event to Splunk HEC
        if: ${{ vars.DORA_ENABLED != 'false' }}
        env:
          CI_ACTOR: ${{ github.actor }}
          CI_RUN_ID: ${{ github.run_id }}
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOY_ENVIRONMENT_INPUT: ${{ inputs.deploy_environment }}
          DEPLOY_STATUS_INPUT: ${{ inputs.deploy_status }}
          DEPLOY_TRIGGER_INPUT: ${{ inputs.deploy_trigger }}
          FIRST_COMMIT_AT_OUTPUT: ${{ steps.metadata.outputs.first_commit_at }}
          GIT_BRANCH_NAME: ${{ github.ref_name }}
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_PR_NUMBER_OUTPUT: ${{ steps.metadata.outputs.pr_number }}
          GIT_RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
          LEAD_TIME_MS_OUTPUT: ${{ steps.metadata.outputs.lead_time_ms }}
          DEPLOY_DOMAIN_OUTPUT: ${{ steps.metadata.outputs.domain }}
          DEPLOY_DURATION_MS_OUTPUT: ${{ steps.metadata.outputs.duration_ms }}
          DEPLOY_FINISHED_AT_OUTPUT: ${{ steps.metadata.outputs.finished_at }}
          DEPLOY_ID_OUTPUT: ${{ steps.metadata.outputs.deploy_id }}
          DEPLOY_IS_FAILURE_OUTPUT: ${{ steps.metadata.outputs.is_failure }}
          DEPLOY_SERVICE_OUTPUT: ${{ steps.metadata.outputs.service }}
          DEPLOY_STARTED_AT_OUTPUT: ${{ steps.metadata.outputs.started_at }}
          SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
          SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}
        run: |
          # Skip if Splunk is not configured (template mode)
          if [ -z "$SPLUNK_HEC_URL" ] || [ -z "$SPLUNK_HEC_TOKEN" ]; then
            echo "WARN: SPLUNK_HEC_URL or SPLUNK_HEC_TOKEN not configured."
            echo "      Deploy event will be logged locally but not sent to Splunk."
            echo "      Configure these secrets to enable DORA metric emission."
            SKIP_SEND=true
          fi

          # Build the event JSON
          EVENT_JSON=$(cat <<HEREDOC
          {
            "index": "dora_events",
            "sourcetype": "_json",
            "source": "github-actions",
            "host": "${GITHUB_REPOSITORY_VALUE}",
            "event": {
              "event_type": "deploy",
              "deploy_id": "${DEPLOY_ID_OUTPUT}",
              "deploy_status": "${DEPLOY_STATUS_INPUT}",
              "deploy_environment": "${DEPLOY_ENVIRONMENT_INPUT}",
              "deploy_started_at": "${DEPLOY_STARTED_AT_OUTPUT}",
              "deploy_finished_at": "${DEPLOY_FINISHED_AT_OUTPUT}",
              "deploy_duration_ms": ${DEPLOY_DURATION_MS_OUTPUT},
              "deploy_trigger": "${DEPLOY_TRIGGER_INPUT}",
              "service_domain": "${DEPLOY_DOMAIN_OUTPUT}",
              "service_name": "${DEPLOY_SERVICE_OUTPUT}",
              "git_commit_sha": "${GIT_COMMIT_SHA}",
              "git_branch": "${GIT_BRANCH_NAME}",
              "git_release_tag": "${GIT_RELEASE_TAG_INPUT}",
              "git_pr_number": ${GIT_PR_NUMBER_OUTPUT:-null},
              "git_first_commit_at": "${FIRST_COMMIT_AT_OUTPUT}",
              "ci_run_id": "${CI_RUN_ID}",
              "ci_run_url": "${CI_RUN_URL}",
              "ci_actor": "${CI_ACTOR}",
              "dora_lead_time_ms": ${LEAD_TIME_MS_OUTPUT},
              "dora_is_failure": ${DEPLOY_IS_FAILURE_OUTPUT},
              "correlation_id": "${DEPLOY_ID_OUTPUT}"
            }
          }
          HEREDOC
          )

          # Log the event for debugging (redact in production)
          echo "Deploy event payload:"
          echo "$EVENT_JSON" | jq '.' 2>/dev/null || echo "$EVENT_JSON"

          # Send to Splunk HEC
          if [ "${SKIP_SEND:-false}" = "true" ]; then
            echo "SKIPPED: Splunk HEC not configured. Event logged above only."
            exit 0
          fi

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$SPLUNK_HEC_URL" \
            -H "Authorization: Splunk $SPLUNK_HEC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$EVENT_JSON" \
            --max-time 10)

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Deploy event sent to Splunk HEC (HTTP $HTTP_STATUS)"
          else
            echo "WARN: Splunk HEC returned HTTP $HTTP_STATUS"
            echo "      Deploy event may not have been indexed."
            echo "      This is non-blocking — deploy continues regardless."
            # Non-blocking: don't fail the workflow if Splunk is down
          fi
