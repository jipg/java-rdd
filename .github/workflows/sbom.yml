# =============================================================================
# sbom.yml — SBOM Generation with CycloneDX Maven Plugin
# =============================================================================

name: SBOM Generation (CycloneDX)

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Generate SBOM
        run: |
          ./mvnw org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -DoutputFormat=all \
            -DoutputName=sbom
          echo "SBOM generated"

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: |
            target/sbom.json
            target/sbom.xml
          retention-days: 90

      - name: Upload SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            target/sbom.json \
            target/sbom.xml \
            --clobber
